<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1024" />
    <title>Logo export</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        background: #ffffff;
      }
      img {
        display: block;
        width: 1024px;
        height: 1024px;
      }
    </style>
  </head>
  <body>
    <!-- Same pixels as public/favicon.svg at 1024×1024 (browser system fonts). -->
    <img src="../public/favicon.svg" width="1024" height="1024" alt="" />
  </body>
</html>
